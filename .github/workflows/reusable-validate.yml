name: Reusable Validation

on:
  workflow_call:
    inputs:
      directory:
        description: 'The directory of the component to validate'
        required: true
        type: string

permissions: {} # Global permissions set to none (least privilege)

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read # Specific job permissions
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ inputs.directory }}/package-lock.json'

      - name: Install dependencies
        run: |
          if (Test-Path package-lock.json) {
            npm ci
          } else {
            npm install
          }
        working-directory: ${{ inputs.directory }}
        shell: pwsh

      - name: Run Lint
        run: npm run lint
        working-directory: ${{ inputs.directory }}
